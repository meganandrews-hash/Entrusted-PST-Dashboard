</div>

</button>

</main>

  /* ── Navigation ─────────────────── */
  switchView(id, scrollTo) {
    document.querySelectorAll('.view-section').forEach(s => { s.classList.add('hidden'); s.classList.remove('block'); });
    const t = document.getElementById(id);
    if (t) { t.classList.remove('hidden'); t.classList.add('block'); }
    document.querySelectorAll('.nav-btn').forEach(b => { b.classList.remove('active'); });
    const btn = document.querySelector(`.nav-btn[data-target="${id}"]`);
    if (btn) btn.classList.add('active');
    document.getElementById('views-wrap').scrollTop = 0;
    if (scrollTo) {
      setTimeout(() => {
        const el = document.getElementById(scrollTo);
        if (el) { el.scrollIntoView({behavior:'smooth',block:'center'}); el.classList.add('ring-4','ring-primary','ring-opacity-60'); setTimeout(()=>el.classList.remove('ring-4','ring-primary','ring-opacity-60'),2500); }
      }, 150);
    }
  },

  toggle(el) {
    const wrap = el.closest('.collapsible');
    if (!wrap) return;
    wrap.classList.toggle('collapsed');

        <td class="font-bold text-slate-800">${p.item}</td>
        <td class="text-center font-black text-slate-700 border-x border-slate-200 bg-slate-50/50">${p.qty}</td>
        <td class="text-center"><a href="${p.link}" class="text-[9px] text-primary hover:bg-primary hover:text-white font-bold uppercase tracking-wider bg-primary/10 px-2 py-1 rounded transition-colors inline-flex items-center gap-1"><i class="fa-solid fa-link"></i>View</a></td>
      </tr>`;
    });
    h += `</tbody></table></div></div></div>`;

    document.getElementById('view-3').innerHTML = h;
  },

  /* ═══ TAB 4: PHOTO GALLERY ═══ */
  renderTab4Photos() {
    let h = `<div class="card collapsible">
      <div class="select-right"><span>Select All</span><input type="checkbox" class="pdf-cb" onchange="app.selAll('photo-grid',this.checked)"></div>
      <div class="collapse-hdr flex items-center gap-2 mb-3" onclick="app.toggle(this)">
        <i class="fa-solid fa-chevron-down collapse-icon text-slate-400 text-xs"></i>
        <h2 class="card-title !mb-0"><i class="fa-solid fa-camera text-primary mr-2"></i>Advanced Photo Gallery</h2>
      </div>
      <div class="collapse-body">
        <div class="grid grid-cols-1 sm:grid-cols-4 gap-3 mb-4 bg-slate-50 p-3 rounded-lg border border-slate-200">
          <div><label class="block text-[9px] font-bold text-slate-500 uppercase mb-1">Search</label><input type="text" id="ph-search" class="w-full bg-white border border-slate-200 text-sm rounded-lg p-2 focus:border-primary focus:outline-none" oninput="app.renderPhotos()"></div>
          <div><label class="block text-[9px] font-bold text-slate-500 uppercase mb-1">Room</label><select id="ph-room" class="w-full bg-white border border-slate-200 text-sm rounded-lg p-2 focus:border-primary focus:outline-none" onchange="app.renderPhotos()"><option value="All">All Rooms</option></select></div>
          <div><label class="block text-[9px] font-bold text-slate-500 uppercase mb-1">Date</label><select id="ph-date" class="w-full bg-white border border-slate-200 text-sm rounded-lg p-2 focus:border-primary focus:outline-none" onchange="app.renderPhotos()"><option value="All">All Dates</option></select></div>
          <div><label class="block text-[9px] font-bold text-slate-500 uppercase mb-1">Phase</label><select id="ph-phase" class="w-full bg-white border border-slate-200 text-sm rounded-lg p-2 focus:border-primary focus:outline-none" onchange="app.renderPhotos()"><option value="All">All Phases</option></select></div>
        </div>
        <div id="photo-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
      </div>
    </div>`;

    document.getElementById('view-4').innerHTML = h;

    const rooms = [...new Set(DATA.photos.map(p => p.room))];
    const pDates = [...new Set(DATA.photos.map(p => p.date))];
    const phases = [...new Set(DATA.photos.map(p => p.phase))];
    rooms.forEach(r => document.getElementById('ph-room').innerHTML += `<option value="${r}">${r}</option>`);
    pDates.forEach(d => document.getElementById('ph-date').innerHTML += `<option value="${d}">${d}</option>`);
    phases.forEach(p => document.getElementById('ph-phase').innerHTML += `<option value="${p}">${p}</option>`);
    this.renderPhotos();
  },

  renderPhotos() {
    const s = (document.getElementById('ph-search')?.value || '').toLowerCase();
    const r = document.getElementById('ph-room')?.value || 'All';
    const d = document.getElementById('ph-date')?.value || 'All';
    const p = document.getElementById('ph-phase')?.value || 'All';
    let f = DATA.photos;
    if (r !== 'All') f = f.filter(x => x.room === r);
    if (d !== 'All') f = f.filter(x => x.date === d);
    if (p !== 'All') f = f.filter(x => x.phase === p);
    if (s) f = f.filter(x => x.room.toLowerCase().includes(s) || x.phase.toLowerCase().includes(s) || x.date.toLowerCase().includes(s));

    const grid = document.getElementById('photo-grid');
    if (!grid) return;
    grid.innerHTML = f.length ? f.map(ph => `
      <div class="photo-card relative">
        <div class="absolute top-2 left-2 z-10"><label class="flex items-center gap-1 bg-black/75 text-white text-[8px] font-bold uppercase tracking-wider px-2 py-1 rounded cursor-pointer"><input type="checkbox" class="pdf-cb" data-sel="${ph.id}" style="width:12px;height:12px">Select</label></div>
        <div class="absolute top-2 right-2 z-10"><span class="bg-black/75 text-white text-[8px] font-bold tracking-widest uppercase px-2 py-1 rounded">${ph.phase}</span></div>
        <img src="${ph.url}" alt="${ph.room}" loading="lazy"/>
        <div class="p-2.5 text-center border-t border-slate-100">
          <p class="text-[11px] font-black tracking-wide uppercase text-slate-800">${ph.room}</p>
          <p class="text-[9px] text-slate-500 font-mono">${ph.date}</p>
        </div>
      </div>`).join('') : '<p class="col-span-full text-center text-slate-400 py-10">No photos match your filters.</p>';
  },

  /* ═══ TAB 5: DOCUMENTS & REPORTING ═══ */
  renderTab5Docs() {
    let h = '';

    h += `<div class="card bg-slate-50 border-slate-200">
      <h2 class="card-title"><i class="fa-solid fa-clipboard-check text-primary mr-2"></i>Reporting Action Center</h2>
      <p class="text-sm text-slate-600 mb-4 max-w-2xl">Generate fully populated corporate templates using the active job data.</p>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-2.5">
        <button onclick="app.generatePDF('24hr')" class="action-btn"><i class="fa-regular fa-file-pdf text-primary"></i>24-HR PDF</button>
        <button onclick="app.generatePDF('dmo')" class="action-btn"><i class="fa-solid fa-file-pdf text-primary"></i>DMO Approval</button>
        <button onclick="app.generatePDF('adjuster')" class="action-btn"><i class="fa-solid fa-file-pdf text-primary"></i>Adjuster Report</button>
        <button onclick="app.generatePDF('photo')" class="action-btn"><i class="fa-solid fa-image text-primary"></i>Photo Report</button>
        <button onclick="app.generatePDF('3k')" class="action-btn"><i class="fa-solid fa-sack-dollar text-primary"></i>$3k Limit Request</button>
      </div>
    </div>`;

    h += `<div class="card collapsible">
      <div class="select-right"><span>Select All</span><input type="checkbox" class="pdf-cb" onchange="app.selAll('docs-grid',this.checked)"></div>
      <div class="collapse-hdr flex items-center gap-2 mb-3" onclick="app.toggle(this)">
        <i class="fa-solid fa-chevron-down collapse-icon text-slate-400 text-xs"></i>
        <h2 class="card-title !mb-0"><i class="fa-regular fa-folder-open text-primary mr-2"></i>Available Documents</h2>
      </div>
      <div class="collapse-body" id="docs-grid">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3">`;
    DATA.docs.forEach(doc => {
      h += `<div class="border border-slate-200 rounded-lg p-3 bg-white flex items-center justify-between hover:border-primary/50 cursor-pointer shadow-sm transition-colors">
        <div class="flex items-center gap-2.5">
          <div class="w-9 h-9 rounded-lg bg-red-50 text-red-500 flex items-center justify-center"><i class="fa-solid fa-file-pdf"></i></div>
          <div><p class="font-bold text-xs text-slate-800">${doc.name}</p><p class="text-[8px] text-slate-400 font-mono mt-0.5">${doc.date}</p></div>
        </div>
        <div class="flex items-center gap-2">
          <button class="text-slate-300 hover:text-primary transition-colors" title="View"><i class="fa-solid fa-eye"></i></button>
          <button class="text-slate-300 hover:text-primary transition-colors" title="Download"><i class="fa-solid fa-download"></i></button>
          <input type="checkbox" class="pdf-cb" data-sel="${doc.id}">
        </div>
      </div>`;
    });
    h += `</div></div></div>`;

    document.getElementById('view-5').innerHTML = h;
  },

  /* ═══ TAB 6: NEGOTIATIONS CALCULATOR ═══ */
  renderTab6Calc() {
    let h = `<div class="card">
      <h2 class="card-title text-xl border-b border-slate-200 pb-3 mb-5"><i class="fa-solid fa-calculator text-primary mr-2.5"></i>Mitigation Negotiations Calculator</h2>

      <div class="overflow-x-auto rounded-lg border border-slate-200 shadow-sm mb-5">
        <table class="w-full text-left"><thead class="thead-s"><tr>
          <th class="w-[45%]">Line Item Description</th>
          <th class="text-center border-x border-slate-200">Original ($)</th>
          <th class="text-center border-r border-slate-200 bg-red-50/50 text-red-700">Deduction ($)</th>
          <th class="text-center blue-col">Revised ($)</th>
        </tr></thead><tbody class="divide-y divide-slate-100 bg-white" id="neg-rows">`;
    DATA.negotiation.lines.forEach((line, i) => {
      h += `<tr class="trow">
        <td class="font-bold text-slate-800">${line.desc}</td>
        <td class="text-center font-mono font-bold text-slate-600 border-x border-slate-200">$${line.orig.toFixed(2)}</td>
        <td class="text-center border-r border-slate-200 bg-red-50/20">
          <input type="number" value="0" step="0.01" min="0" class="neg-input w-20 text-center bg-transparent border border-slate-200 rounded px-1 py-0.5 font-mono text-sm focus:border-primary focus:outline-none" data-idx="${i}" oninput="app.calcNeg()">
        </td>
        <td class="text-center font-mono font-black text-blue-800 bg-blue-50/25 neg-revised" data-idx="${i}">$${line.orig.toFixed(2)}</td>
      </tr>`;
    });
    h += `</tbody></table></div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-5">
        <div class="bg-slate-50 border border-slate-200 rounded-lg p-4 text-center">
          <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1">Original Invoice Total</p>
          <p class="text-2xl font-black text-slate-800 font-mono" id="neg-orig">$0.00</p>
        </div>
        <div class="bg-red-50 border border-red-200 rounded-lg p-4 text-center">
          <p class="text-[9px] font-bold text-red-500 uppercase tracking-widest mb-1">Total Deductions</p>
          <p class="text-2xl font-black text-red-600 font-mono" id="neg-deduct">-$0.00</p>
        </div>
        <div class="bg-slate-800 rounded-lg p-4 text-center border-b-4 border-green-500 relative overflow-hidden">
          <i class="fa-solid fa-file-invoice-dollar absolute -right-4 -bottom-4 text-6xl text-slate-700/40 -rotate-12"></i>
          <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1 relative z-10">Revised Total</p>
          <p class="text-2xl font-black text-green-400 font-mono relative z-10" id="neg-revised">$0.00</p>
        </div>
      </div>

      <div class="border-t border-slate-200 pt-4">
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Negotiation Notes / Justifications</label>
        <textarea class="w-full bg-slate-50 border border-slate-200 rounded-lg p-3.5 text-sm text-slate-700 focus:outline-none focus:ring-2 ring-primary/20 focus:bg-white transition-colors min-h-[120px]" placeholder="Document specifics on line item kickbacks, e.g. 'Adjuster refused to pay for 4th air mover day despite CAT 3 protocols...'"></textarea>
      </div>
    </div>`;

    document.getElementById('view-6').innerHTML = h;
    this.calcNeg();
  },

  calcNeg() {
    let totalOrig = 0, totalDeduct = 0;
    DATA.negotiation.lines.forEach((line, i) => {
      const inp = document.querySelector(`.neg-input[data-idx="${i}"]`);
      const ded = inp ? parseFloat(inp.value) || 0 : 0;
      const revised = line.orig - ded;
      totalOrig += line.orig;
      totalDeduct += ded;
      const cell = document.querySelector(`.neg-revised[data-idx="${i}"]`);
      if (cell) cell.textContent = '$' + revised.toFixed(2);
    });
    document.getElementById('neg-orig').textContent = '$' + totalOrig.toFixed(2);
    document.getElementById('neg-deduct').textContent = '-$' + totalDeduct.toFixed(2);
    document.getElementById('neg-revised').textContent = '$' + (totalOrig - totalDeduct).toFixed(2);
  },

  /* ═══ PDF GENERATION ═══ */
  generatePDF(type) {
    const names = { '24hr':'24-Hour Report', 'dmo':'DMO Approval', 'adjuster':'Adjuster Report', 'photo':'Photo Report', '3k':'$3,000 Limit Request' };
    alert(`PDF Generation: "${names[type] || type}"\n\nThis would generate a fully formatted PDF using jsPDF + html2canvas.\n\nJob: ${DATA.job.id}\nClient: ${DATA.job.client}`);
  },

  generateCustomPDF() {
    const checked = document.querySelectorAll('.pdf-cb:checked');
    if (checked.length === 0) { alert('Please select at least one item using the checkboxes before generating a Custom PDF.'); return; }
    const ids = Array.from(checked).map(cb => cb.dataset.sel || 'section').filter(Boolean);
    alert(`Custom PDF Generation\n\n${checked.length} items selected:\n${ids.join('\n')}\n\nThis would compile selected items into a single PDF using jsPDF + html2canvas.`);
  }
};

document.addEventListener('DOMContentLoaded', () => app.init());
</script>
</body>
</html>
